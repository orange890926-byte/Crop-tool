<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropAlpha 貼圖進階裁切工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121216;
      color: #e0e0e0;
      padding: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e24;
      padding: 10px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .top-bar h1 { font-size: 18px; color: #a78bfa; }
    .badge { background: #374151; padding: 4px 10px; border-radius: 20px; font-size: 13px; }

    .main-container {
      display: flex;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    /* 左側工作區 */
    .editor-section {
      flex: 2;
      min-width: 350px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 右側面板 */
    .control-section {
      flex: 1;
      min-width: 300px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Canvas 拖曳框選區 */
    .canvas-wrapper {
      position: relative;
      background: #000;
      border-radius: 6px;
      overflow: auto;
      max-height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px dashed #374151;
      user-select: none;
    }
    #mainCanvas { cursor: crosshair; display: block; max-width: 100%; }

    /* 按鈕樣式 */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-auto { background: #8b5cf6; color: white; font-size: 15px; }
    .btn-manual { background: #4b5563; color: white; }
    .btn-upload { background: #3b82f6; color: white; }
    .btn-download { background: #06b6d4; color: white; font-size: 16px; padding: 12px; }
    .btn-reset { background: #ef4444; color: white; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 設定控制列 */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #272730;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .custom-grid-inputs {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .custom-grid-inputs input {
      width: 45px;
      background: #374151;
      color: #fff;
      border: 1px solid #4b5563;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
    }

    /* 下方預覽區 */
    .preview-section {
      width: 100%;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    /* 貼圖預覽網格 (可拖拽排序) */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #121216;
      border-radius: 6px;
      background-image: linear-gradient(45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(-45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1c1c22 75%), 
                        linear-gradient(-45deg, transparent 75%, #1c1c22 75%);
      background-size: 12px 12px;
    }

    .sticker-item {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 2px solid #374151;
      border-radius: 6px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: transform 0.15s, border-color 0.15s;
    }
    .sticker-item:active { cursor: grabbing; }
    .sticker-item.dragging {
      opacity: 0.4;
      border-color: #8b5cf6;
      transform: scale(0.95);
    }
    .sticker-item img { max-width: 85%; max-height: 85%; object-fit: contain; pointer-events: none; }
    
    .sticker-item .idx-tag {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,0.75);
      color: #60a5fa;
      font-weight: bold;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
    }
    .sticker-item .del-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ef4444;
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      line-height: 20px;
      text-align: center;
      z-index: 2;
    }

    .selection-box {
      position: absolute;
      border: 2px dashed #06b6d4;
      background: rgba(6, 182, 212, 0.2);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>田 CropAlpha 貼圖進階裁切工具</h1>
    <div class="badge">已儲存：<span id="savedCount">0</span> / 40 張</div>
  </div>

  <div class="main-container">
    <!-- 左側圖片編輯區 -->
    <div class="editor-section">
      <div class="setting-row">
        <span>偵測模式：</span>
        <select id="gridMode" onchange="toggleGridMode()" style="background:#374151; color:#fff; border:none; padding:4px; border-radius:4px;">
          <option value="4x4">4 x 4 (16張)</option>
          <option value="5x8">5 x 8 (40張)</option>
          <option value="custom">⚙ 自訂網格</option>
        </select>

        <div class="custom-grid-inputs" id="customGridInputs">
          <input type="number" id="customCols" value="6" min="1" max="20" title="欄數 (Cols)">
          <span>x</span>
          <input type="number" id="customRows" value="3" min="1" max="20" title="列數 (Rows)">
          <span id="customTotalTag" style="font-size: 11px; color: #a78bfa;">(18張)</span>
        </div>
      </div>

      <div class="setting-row">
        <label><input type="checkbox" id="bgRemoveToggle" checked> 開啟自動去背</label>
        <div>
          去背顏色：<input type="color" id="bgColor" value="#ffffff">
          容差：<input type="number" id="tolerance" value="25" min="0" max="100" style="width:50px; background:#374151; color:#fff; border:none; text-align:center;">
        </div>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
        <p id="placeholderText" style="color:#6b7280;">拖曳圖片至此，或直接按 Ctrl+V 貼上圖片</p>
      </div>
    </div>

    <!-- 右側控制按鈕面板 -->
    <div class="control-section">
      <button class="btn btn-auto" id="autoDetectBtn" onclick="autoDetectGrid()">✦ 自動偵測貼圖</button>
      <button class="btn btn-manual" id="manualCropBtn" onclick="cropManualSelection()" disabled>✂ 手動裁切並加入</button>
      
      <hr style="border-color: #272730; margin: 5px 0;">

      <label class="btn btn-upload">
        ↑ 上傳下一張 / 替換圖片
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
      </label>

      <button class="btn btn-download" onclick="downloadZip()">⬇ 下載 ZIP</button>
      <button class="btn btn-reset" onclick="resetAll()">↺ 全部重來</button>
    </div>

    <!-- 下方累積預覽區 -->
    <div class="preview-section">
      <div class="preview-header">
        <h3>已裁切貼圖預覽 (可拖動卡片調整順序)</h3>
      </div>
      <div class="sticker-grid" id="stickerGrid"></div>
    </div>
  </div>

  <script>
    let savedStickers = [];
    let currentImage = null;
    let isDrawing = false;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    let draggedIndex = null;

    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const placeholderText = document.getElementById('placeholderText');
    const stickerGrid = document.getElementById('stickerGrid');
    const savedCountEl = document.getElementById('savedCount');

    const customColsInput = document.getElementById('customCols');
    const customRowsInput = document.getElementById('customRows');
    const customTotalTag = document.getElementById('customTotalTag');

    function updateCustomTotal() {
      const c = parseInt(customColsInput.value) || 1;
      const r = parseInt(customRowsInput.value) || 1;
      customTotalTag.innerText = `(${c * r}張)`;
    }
    customColsInput.addEventListener('input', updateCustomTotal);
    customRowsInput.addEventListener('input', updateCustomTotal);

    function toggleGridMode() {
      const mode = document.getElementById('gridMode').value;
      const customInputs = document.getElementById('customGridInputs');
      customInputs.style.display = (mode === 'custom') ? 'flex' : 'none';
      if (mode === 'custom') updateCustomTotal();
    }

    // 貼上 (Ctrl+V) 與 拖曳讀圖
    window.addEventListener('paste', e => {
      const items = e.clipboardData.items;
      for (let item of items) {
        if (item.type.indexOf('image') !== -1) loadImage(item.getAsFile());
      }
    });

    canvasWrapper.addEventListener('dragover', e => e.preventDefault());
    canvasWrapper.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
    });

    function handleFileSelect(e) {
      if (e.target.files.length > 0) loadImage(e.target.files[0]);
    }

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = event => {
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          placeholderText.style.display = 'none';
          drawCanvas();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    function drawCanvas() {
      if (!currentImage) return;
      mainCanvas.width = currentImage.width;
      mainCanvas.height = currentImage.height;
      ctx.drawImage(currentImage, 0, 0);
    }

    // --- 自動偵測貼圖 + 畫出分割線與數字 ---
    function autoDetectGrid() {
      if (!currentImage) return alert('請先上傳圖片！');

      const mode = document.getElementById('gridMode').value;
      let cols = 4, rows = 4;

      if (mode === '4x4') { cols = 4; rows = 4; }
      else if (mode === '5x8') { cols = 5; rows = 8; }
      else if (mode === 'custom') {
        cols = parseInt(customColsInput.value) || 1;
        rows = parseInt(customRowsInput.value) || 1;
      }

      const cellW = currentImage.width / cols;
      const cellH = currentImage.height / rows;

      // 1. 重繪原圖
      drawCanvas();

      // 2. 裁切處理並在 Canvas 上繪製網格線條與編號
      let count = 0;
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = Math.max(2, Math.floor(currentImage.width / 400));
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      
      const fontSize = Math.max(14, Math.floor(cellH * 0.12));
      ctx.font = `bold ${fontSize}px sans-serif`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          count++;
          
          // 畫格子框
          ctx.strokeRect(c * cellW, r * cellH, cellW, cellH);

          // 畫左上角數字底塊與標號
          const tagW = fontSize * 1.8;
          const tagH = fontSize * 1.4;
          ctx.fillRect(c * cellW, r * cellH, tagW, tagH);

          ctx.fillStyle = '#ffffff';
          ctx.fillText(count, c * cellW + (fontSize * 0.3), r * cellH + (fontSize * 1.0));
          ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; // 恢復底色設置

          // 執行圖片裁切加入
          if (savedStickers.length < 40) {
            const cropCvs = document.createElement('canvas');
            cropCvs.width = cellW;
            cropCvs.height = cellH;
            const cCtx = cropCvs.getContext('2d');

            cCtx.drawImage(currentImage, c * cellW, r * cellH, cellW, cellH, 0, 0, cellW, cellH);

            if (document.getElementById('bgRemoveToggle').checked) {
              removeBg(cCtx, cellW, cellH);
            }
            addSticker(cropCvs);
          }
        }
      }
      scrollToPreview();
    }

    // --- 手動框選邏輯 ---
    let selectionBox = null;
    mainCanvas.addEventListener('mousedown', startSelect);
    mainCanvas.addEventListener('mousemove', drawSelect);
    mainCanvas.addEventListener('mouseup', endSelect);

    function startSelect(e) {
      if (!currentImage) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      startX = (e.clientX - rect.left) * scaleX;
      startY = (e.clientY - rect.top) * scaleY;
      isDrawing = true;

      if (!selectionBox) {
        selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        canvasWrapper.appendChild(selectionBox);
      }
    }

    function drawSelect(e) {
      if (!isDrawing) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      endX = (e.clientX - rect.left) * scaleX;
      endY = (e.clientY - rect.top) * scaleY;

      const left = Math.min(startX, endX) / scaleX;
      const top = Math.min(startY, endY) / scaleY;
      const width = Math.abs(endX - startX) / scaleX;
      const height = Math.abs(endY - startY) / scaleY;

      selectionBox.style.left = `${left + mainCanvas.offsetLeft}px`;
      selectionBox.style.top = `${top + mainCanvas.offsetTop}px`;
      selectionBox.style.width = `${width}px`;
      selectionBox.style.height = `${height}px`;

      document.getElementById('manualCropBtn').disabled = false;
    }

    function endSelect() { isDrawing = false; }

    function cropManualSelection() {
      if (!currentImage || Math.abs(endX - startX) < 10) return;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      const cropCvs = document.createElement('canvas');
      cropCvs.width = w;
      cropCvs.height = h;
      const cCtx = cropCvs.getContext('2d');

      cCtx.drawImage(currentImage, x, y, w, h, 0, 0, w, h);

      if (document.getElementById('bgRemoveToggle').checked) {
        removeBg(cCtx, w, h);
      }

      addSticker(cropCvs);

      if (selectionBox) selectionBox.remove();
      selectionBox = null;
      document.getElementById('manualCropBtn').disabled = true;
      scrollToPreview();
    }

    // --- 去背處理 ---
    function removeBg(cCtx, w, h) {
      const imgData = cCtx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const hex = document.getElementById('bgColor').value;
      const tol = parseInt(document.getElementById('tolerance').value) * 2.55;

      const targetR = parseInt(hex.slice(1, 3), 16);
      const targetG = parseInt(hex.slice(3, 5), 16);
      const targetB = parseInt(hex.slice(5, 7), 16);

      for (let i = 0; i < data.length; i += 4) {
        const dist = Math.sqrt(
          Math.pow(data[i] - targetR, 2) +
          Math.pow(data[i+1] - targetG, 2) +
          Math.pow(data[i+2] - targetB, 2)
        );
        if (dist <= tol) data[i + 3] = 0;
      }
      cCtx.putImageData(imgData, 0, 0);
    }

    // --- 貼圖管理與 HTML5 拖拽排序 ---
    function addSticker(canvas) {
      if (savedStickers.length >= 40) return;
      savedStickers.push(canvas);
      updatePreview();
    }

    function removeSticker(idx) {
      savedStickers.splice(idx, 1);
      updatePreview();
    }

    function updatePreview() {
      stickerGrid.innerHTML = '';
      savedCountEl.innerText = savedStickers.length;

      savedStickers.forEach((cvs, idx) => {
        const item = document.createElement('div');
        item.className = 'sticker-item';
        item.draggable = true;
        item.dataset.index = idx;

        // 拖拽事件綁定
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);

        const img = document.createElement('img');
        img.src = cvs.toDataURL('image/png');

        const tag = document.createElement('div');
        tag.className = 'idx-tag';
        tag.innerText = String(idx + 1).padStart(3, '0');

        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.innerText = '✕';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          removeSticker(idx);
        };

        item.appendChild(img);
        item.appendChild(tag);
        item.appendChild(delBtn);
        stickerGrid.appendChild(item);
      });
    }

    // 拖動排序邏輯
    function handleDragStart(e) {
      draggedIndex = parseInt(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDrop(e) {
      e.preventDefault();
      const targetIndex = parseInt(this.dataset.index);
      if (draggedIndex !== null && draggedIndex !== targetIndex) {
        // 移動陣列元素
        const draggedItem = savedStickers.splice(draggedIndex, 1)[0];
        savedStickers.splice(targetIndex, 0, draggedItem);
        updatePreview(); // 重新整理編號與順序
      }
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      draggedIndex = null;
    }

    function scrollToPreview() {
      stickerGrid.scrollIntoView({ behavior: 'smooth' });
    }

    // 打包 ZIP
    function downloadZip() {
      if (savedStickers.length === 0) return alert('預覽區內沒有圖片可以下載！');

      const zip = new JSZip();
      const folder = zip.folder("stickers");

      savedStickers.forEach((cvs, idx) => {
        const fileName = `${String(idx + 1).padStart(3, '0')}.png`;
        const base64 = cvs.toDataURL('image/png').split(',')[1];
        folder.file(fileName, base64, { base64: true });
      });

      zip.generateAsync({ type: "blob" }).then(content => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "LINE_Stickers.zip";
        a.click();
      });
    }

    function resetAll() {
      if (confirm('確定要清空所有內容與已裁切的貼圖嗎？')) {
        savedStickers = [];
        currentImage = null;
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        placeholderText.style.display = 'block';
        updatePreview();
      }
    }
  </script>
</body>
</html>
