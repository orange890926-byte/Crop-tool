<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropAlpha 貼圖/表情貼進階編輯工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121216;
      color: #e0e0e0;
      padding: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e24;
      padding: 10px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .top-bar h1 { font-size: 18px; color: #a78bfa; }
    .badge { background: #374151; padding: 4px 10px; border-radius: 20px; font-size: 13px; }

    .main-container {
      display: flex;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .editor-section {
      flex: 2;
      min-width: 350px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-section {
      flex: 1;
      min-width: 300px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .canvas-wrapper {
      position: relative;
      background: #000;
      border-radius: 6px;
      overflow: auto;
      max-height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px dashed #374151;
      user-select: none;
    }
    #mainCanvas { cursor: crosshair; display: block; max-width: 100%; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-auto { background: #8b5cf6; color: white; font-size: 15px; }
    .btn-manual { background: #4b5563; color: white; }
    .btn-upload { background: #3b82f6; color: white; }
    .btn-download { background: #06b6d4; color: white; font-size: 16px; padding: 12px; }
    .btn-reset { background: #ef4444; color: white; }
    .btn-clear-preview {
      background: #dc2626;
      color: white;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-clear-preview:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #272730;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .custom-grid-inputs {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .custom-grid-inputs input {
      width: 45px;
      background: #374151;
      color: #fff;
      border: 1px solid #4b5563;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 2px;
    }

    .slider-container input[type="range"] {
      flex: 1;
      accent-color: #8b5cf6;
      cursor: pointer;
    }

    .preview-section {
      width: 100%;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #121216;
      border-radius: 6px;
      background-image: linear-gradient(45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(-45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1c1c22 75%), 
                        linear-gradient(-45deg, transparent 75%, #1c1c22 75%);
      background-size: 12px 12px;
    }

    .sticker-item {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 2px solid #374151;
      border-radius: 6px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: transform 0.15s, border-color 0.15s;
    }
    .sticker-item:active { cursor: grabbing; }
    .sticker-item.dragging {
      opacity: 0.4;
      border-color: #8b5cf6;
      transform: scale(0.95);
    }
    .sticker-item img { max-width: 85%; max-height: 85%; object-fit: contain; pointer-events: none; }
    
    .sticker-item .idx-tag {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,0.75);
      color: #60a5fa;
      font-weight: bold;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
    }

    .sticker-item .edit-btn {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      z-index: 2;
    }
    .sticker-item .del-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ef4444;
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      line-height: 20px;
      text-align: center;
      z-index: 2;
    }

    .selection-box {
      position: absolute;
      border: 2px dashed #06b6d4;
      background: rgba(6, 182, 212, 0.2);
      pointer-events: none;
    }

    /* Modal 視窗樣式 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: #1e1e24;
      padding: 20px;
      border-radius: 8px;
      max-width: 480px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #374151;
    }
    .modal-preview {
      width: 220px;
      height: 220px;
      margin: 0 auto;
      background-image: linear-gradient(45deg, #272730 25%, transparent 25%), 
                        linear-gradient(-45deg, #272730 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #272730 75%), 
                        linear-gradient(-45deg, transparent 75%, #272730 75%);
      background-size: 12px 12px;
      border: 2px solid #8b5cf6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #modalCanvas { cursor: crosshair; touch-action: none; max-width: 100%; max-height: 100%; object-fit: contain; }

    .tool-group {
      background: #272730;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }
    .tool-title { color: #a78bfa; font-weight: bold; margin-bottom: 2px; }

    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
      background: #374151;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-small:hover { background: #4b5563; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>田 CropAlpha 智慧不規則邊界切割工具</h1>
    <div style="display:flex; align-items:center; gap:10px;">
      <span style="font-size:13px; font-weight:bold; color:#a78bfa;">輸出類型：</span>
      <select id="exportType" onchange="changeExportType()" style="background:#374151; color:#fff; border:none; padding:5px 8px; border-radius:4px; font-weight:bold;">
        <option value="emoji" selected>😊 表情貼 (180 × 180 + tab.png)</option>
        <option value="sticker">🎨 標準貼圖 (370 × 320 px)</option>
      </select>
      <div class="badge">已儲存：<span id="savedCount">0</span> / 40 張</div>
    </div>
  </div>

  <div class="main-container">
    <div class="editor-section">
      <div class="setting-row">
        <span>偵測模式：</span>
        <select id="gridMode" onchange="toggleGridMode()" style="background:#374151; color:#fff; border:none; padding:4px; border-radius:4px;">
          <option value="smart" selected>⚡ 智慧不規則邊界偵測 (推薦)</option>
          <option value="5x8">網格 5 x 8 (40張 - 標準)</option>
          <option value="4x4">網格 4 x 4 (16張)</option>
          <option value="custom">⚙ 自訂網格</option>
        </select>

        <div class="custom-grid-inputs" id="customGridInputs">
          <input type="number" id="customCols" value="5" min="1" max="20" title="欄數 (Cols)">
          <span>x</span>
          <input type="number" id="customRows" value="8" min="1" max="20" title="列數 (Rows)">
          <span id="customTotalTag" style="font-size: 11px; color: #a78bfa;">(40張)</span>
        </div>
      </div>

      <div class="setting-row">
        <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
          <label><input type="checkbox" id="bgRemoveToggle" checked> 自動去除背景色</label>
          <div>
            背景顏色：<input type="color" id="bgColor" value="#ffffff">
          </div>
        </div>
        
        <div class="slider-container">
          <span>偵測靈敏度/容差：</span>
          <input type="range" id="tolerance" min="1" max="100" value="20" oninput="document.getElementById('tolValue').innerText = this.value">
          <span id="tolValue" style="min-width:25px; text-align:right; font-weight:bold; color:#a78bfa;">20</span>
        </div>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
        <p id="placeholderText" style="color:#6b7280;">拖曳圖片至此，或直接按 Ctrl+V 貼上圖片</p>
      </div>
    </div>

    <div class="control-section">
      <button class="btn btn-auto" id="autoDetectBtn" onclick="runAutoDetect()">✦ 自動偵測並裁切</button>
      <button class="btn btn-manual" id="manualCropBtn" onclick="cropManualSelection()" disabled>✂ 手動框選並加入</button>
      
      <hr style="border-color: #272730; margin: 5px 0;">

      <label class="btn btn-upload">
        ↑ 上傳圖片 / 貼上圖片
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
      </label>

      <button class="btn btn-download" onclick="downloadZip()">⬇ 下載 ZIP (含 tab.png)</button>
      <button class="btn btn-reset" onclick="resetAll()">↺ 全部重來</button>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <h3>已裁切圖案預覽 (點擊 🪄 可進行獨立修邊/縮放)</h3>
        <button class="btn-clear-preview" onclick="clearStickersOnly()">🗑 清空所有圖案</button>
      </div>
      <div class="sticker-grid" id="stickerGrid"></div>
    </div>
  </div>

  <!-- Modal 編輯視窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="color:#a78bfa;">🛠 單張圖案精細編輯</h3>
        <span style="font-size:12px; color:#9ca3af;">(橡皮擦塗抹修邊)</span>
      </div>

      <div class="modal-preview">
        <canvas id="modalCanvas"></canvas>
      </div>

      <div class="tool-group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="tool-title">🧹 橡皮擦修邊</span>
          <button class="btn-small" onclick="resetEraserLayer()">↺ 復原橡皮擦</button>
        </div>
        <div class="slider-container">
          <span>筆刷大小：</span>
          <input type="range" id="eraserSize" min="5" max="50" value="15" oninput="document.getElementById('eraserSizeVal').innerText = this.value + 'px'">
          <span id="eraserSizeVal" style="min-width:35px; text-align:right; color:#a78bfa;">15px</span>
        </div>
      </div>

      <div class="tool-group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="tool-title">🔍 尺寸與位置微調</span>
          <button class="btn-small" onclick="resetTransform()">🎯 正中間 (Reset)</button>
        </div>

        <div class="slider-container">
          <span>縮放大小：</span>
          <input type="range" id="scaleSlider" min="30" max="150" value="100" oninput="updateModalRender()">
          <span id="scaleVal" style="min-width:35px; text-align:right; color:#a78bfa;">100%</span>
        </div>

        <div class="slider-container">
          <span>水平位置 (X)：</span>
          <input type="range" id="offsetXSlider" min="-100" max="100" value="0" oninput="updateModalRender()">
          <span id="offsetXVal" style="min-width:35px; text-align:right; color:#a78bfa;">0</span>
        </div>

        <div class="slider-container">
          <span>垂直位置 (Y)：</span>
          <input type="range" id="offsetYSlider" min="-100" max="100" value="0" oninput="updateModalRender()">
          <span id="offsetYVal" style="min-width:35px; text-align:right; color:#a78bfa;">0</span>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-title">🪄 去背參數</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <span>顏色：<input type="color" id="modalBgColor" value="#ffffff" onchange="updateModalRender()"></span>
        </div>
        <div class="slider-container">
          <span>容差：</span>
          <input type="range" id="modalTolerance" min="1" max="100" value="20" oninput="document.getElementById('modalTolVal').innerText = this.value; updateModalRender();">
          <span id="modalTolVal" style="min-width:35px; text-align:right; color:#a78bfa;">20</span>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-auto" onclick="applyModalEdit()">確認套用</button>
        <button class="btn btn-manual" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    let targetWidth = 180;
    let targetHeight = 180;

    let savedStickers = [];
    let currentImage = null;
    let isDrawing = false;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    let draggedIndex = null;
    let currentEditIndex = null;

    let modalEraserCanvas = null;
    let isErasing = false;

    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const placeholderText = document.getElementById('placeholderText');
    const stickerGrid = document.getElementById('stickerGrid');
    const savedCountEl = document.getElementById('savedCount');

    const customColsInput = document.getElementById('customCols');
    const customRowsInput = document.getElementById('customRows');
    const customTotalTag = document.getElementById('customTotalTag');

    function changeExportType() {
      const type = document.getElementById('exportType').value;
      if (type === 'emoji') {
        targetWidth = 180;
        targetHeight = 180;
      } else if (type === 'sticker') {
        targetWidth = 370;
        targetHeight = 320;
      }
      
      savedStickers.forEach(item => {
        item.finalCanvas = createTargetCanvas(item.rawCanvas);
      });
      updatePreview();
    }

    function updateCustomTotal() {
      const c = parseInt(customColsInput.value) || 1;
      const r = parseInt(customRowsInput.value) || 1;
      customTotalTag.innerText = `(${c * r}張)`;
    }
    customColsInput.addEventListener('input', updateCustomTotal);
    customRowsInput.addEventListener('input', updateCustomTotal);

    function toggleGridMode() {
      const mode = document.getElementById('gridMode').value;
      const customInputs = document.getElementById('customGridInputs');
      customInputs.style.display = (mode === 'custom') ? 'flex' : 'none';
      if (mode === 'custom') updateCustomTotal();
    }

    window.addEventListener('paste', e => {
      const items = e.clipboardData.items;
      for (let item of items) {
        if (item.type.indexOf('image') !== -1) loadImage(item.getAsFile());
      }
    });

    canvasWrapper.addEventListener('dragover', e => e.preventDefault());
    canvasWrapper.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
    });

    function handleFileSelect(e) {
      if (e.target.files.length > 0) loadImage(e.target.files[0]);
    }

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = event => {
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          placeholderText.style.display = 'none';
          drawCanvas();
          detectAutoBgColor(); // 載入時自動分析去背色
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    /* 🎨 自動分析圖片多個邊界，精準偵測背景顏色 */
    function detectAutoBgColor() {
      if (!currentImage) return '#ffffff';

      const tempCvs = document.createElement('canvas');
      const w = currentImage.width;
      const h = currentImage.height;
      tempCvs.width = w;
      tempCvs.height = h;
      const tCtx = tempCvs.getContext('2d');
      tCtx.drawImage(currentImage, 0, 0);

      // 採樣邊界 8 個點 (四個角落 + 四條邊的中點)
      const samplePoints = [
        {x: Math.floor(w * 0.02), y: Math.floor(h * 0.02)},
        {x: Math.floor(w * 0.98), y: Math.floor(h * 0.02)},
        {x: Math.floor(w * 0.02), y: Math.floor(h * 0.98)},
        {x: Math.floor(w * 0.98), y: Math.floor(h * 0.98)},
        {x: Math.floor(w * 0.5),  y: Math.floor(h * 0.02)},
        {x: Math.floor(w * 0.5),  y: Math.floor(h * 0.98)},
        {x: Math.floor(w * 0.02), y: Math.floor(h * 0.5)},
        {x: Math.floor(w * 0.98), y: Math.floor(h * 0.5)}
      ];

      let rSum = 0, gSum = 0, bSum = 0, validSamples = 0;

      samplePoints.forEach(p => {
        const pixel = tCtx.getImageData(p.x, p.y, 1, 1).data;
        if (pixel[3] > 128) { // 只計算非透明區域
          rSum += pixel[0];
          gSum += pixel[1];
          bSum += pixel[2];
          validSamples++;
        }
      });

      if (validSamples === 0) return '#ffffff';

      const avgR = Math.round(rSum / validSamples);
      const avgG = Math.round(gSum / validSamples);
      const avgB = Math.round(bSum / validSamples);

      const hex = "#" + ((1 << 24) + (avgR << 16) + (avgG << 8) + avgB).toString(16).slice(1);
      document.getElementById('bgColor').value = hex;
      return hex;
    }

    function drawCanvas() {
      if (!currentImage) return;
      mainCanvas.width = currentImage.width;
      mainCanvas.height = currentImage.height;
      ctx.drawImage(currentImage, 0, 0);
    }

    function createTargetCanvas(sourceCvs, scalePct = 100, offsetX = 0, offsetY = 0) {
      const finalCvs = document.createElement('canvas');
      finalCvs.width = targetWidth;
      finalCvs.height = targetHeight;
      const fCtx = finalCvs.getContext('2d');

      fCtx.imageSmoothingEnabled = true;
      fCtx.imageSmoothingQuality = 'high';

      const baseScale = Math.min(targetWidth / sourceCvs.width, targetHeight / sourceCvs.height);
      const userScale = scalePct / 100;
      const drawW = sourceCvs.width * baseScale * userScale;
      const drawH = sourceCvs.height * baseScale * userScale;
      
      const centerOffsetX = (targetWidth - drawW) / 2;
      const centerOffsetY = (targetHeight - drawH) / 2;

      fCtx.drawImage(
        sourceCvs, 0, 0, sourceCvs.width, sourceCvs.height,
        centerOffsetX + offsetX, centerOffsetY + offsetY, drawW, drawH
      );
      return finalCvs;
    }

    function createTabCanvas(sourceFinalCvs) {
      const tabWidth = 96;
      const tabHeight = 74;

      const tabCvs = document.createElement('canvas');
      tabCvs.width = tabWidth;
      tabCvs.height = tabHeight;
      const tCtx = tabCvs.getContext('2d');

      tCtx.imageSmoothingEnabled = true;
      tCtx.imageSmoothingQuality = 'high';

      const scale = Math.min(tabWidth / sourceFinalCvs.width, tabHeight / sourceFinalCvs.height);
      const drawW = sourceFinalCvs.width * scale;
      const drawH = sourceFinalCvs.height * scale;
      const offsetX = (tabWidth - drawW) / 2;
      const offsetY = (tabHeight - drawH) / 2;

      tCtx.drawImage(sourceFinalCvs, 0, 0, sourceFinalCvs.width, sourceFinalCvs.height, offsetX, offsetY, drawW, drawH);
      return tabCvs;
    }

    function runAutoDetect() {
      if (!currentImage) return alert('請先上傳圖片！');

      // 觸發邊界自動辨識背景色
      detectAutoBgColor();

      const mode = document.getElementById('gridMode').value;
      if (mode === 'smart') {
        detectSmartObjects();
      } else {
        autoDetectGrid();
      }
    }

    /* ⚡ 智慧不規則物件邊界偵測演算法 */
    function detectSmartObjects() {
      const width = currentImage.width;
      const height = currentImage.height;

      const tempCvs = document.createElement('canvas');
      tempCvs.width = width;
      tempCvs.height = height;
      const tCtx = tempCvs.getContext('2d');
      tCtx.drawImage(currentImage, 0, 0);

      const imgData = tCtx.getImageData(0, 0, width, height);
      const data = imgData.data;

      const hex = document.getElementById('bgColor').value;
      const toleranceVal = parseInt(document.getElementById('tolerance').value);
      const tol = toleranceVal * 2.55;

      const bgR = parseInt(hex.slice(1, 3), 16);
      const bgG = parseInt(hex.slice(3, 5), 16);
      const bgB = parseInt(hex.slice(5, 7), 16);

      const visited = new Uint8Array(width * height);
      for (let i = 0; i < data.length; i += 4) {
        const dist = Math.sqrt(
          Math.pow(data[i] - bgR, 2) +
          Math.pow(data[i+1] - bgG, 2) +
          Math.pow(data[i+2] - bgB, 2)
        );
        const pixelIdx = i / 4;
        visited[pixelIdx] = (dist > tol) ? 1 : 0;
      }

      const boxes = [];
      const visitedBFS = new Uint8Array(width * height);

      for (let y = 0; y < height; y += 4) {
        for (let x = 0; x < width; x += 4) {
          const idx = y * width + x;
          if (visited[idx] === 1 && visitedBFS[idx] === 0) {
            
            let minX = x, maxX = x, minY = y, maxY = y;
            const queue = [x, y];
            visitedBFS[idx] = 1;

            let head = 0;
            while(head < queue.length) {
              const currX = queue[head++];
              const currY = queue[head++];

              if (currX < minX) minX = currX;
              if (currX > maxX) maxX = currX;
              if (currY < minY) minY = currY;
              if (currY > maxY) maxY = currY;

              const neighbors = [
                [currX + 3, currY], [currX - 3, currY],
                [currX, currY + 3], [currX, currY - 3]
              ];

              for (let n = 0; n < neighbors.length; n++) {
                const nx = neighbors[n][0];
                const ny = neighbors[n][1];

                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                  const nIdx = ny * width + nx;
                  if (visited[nIdx] === 1 && visitedBFS[nIdx] === 0) {
                    visitedBFS[nIdx] = 1;
                    queue.push(nx, ny);
                  }
                }
              }
            }

            const boxW = maxX - minX;
            const boxH = maxY - minY;

            if (boxW > 15 && boxH > 15) {
              const pMinX = Math.max(0, minX - 5);
              const pMinY = Math.max(0, minY - 5);
              const pMaxX = Math.min(width, maxX + 5);
              const pMaxY = Math.min(height, maxY + 5);

              boxes.push({
                x: pMinX,
                y: pMinY,
                w: pMaxX - pMinX,
                h: pMaxY - pMinY
              });
            }
          }
        }
      }

      drawCanvas();
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 3]);

      boxes.forEach((box, index) => {
        ctx.strokeRect(box.x, box.y, box.w, box.h);

        ctx.fillStyle = '#8b5cf6';
        ctx.fillRect(box.x, box.y, 24, 20);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText(index + 1, box.x + 5, box.y + 14);

        if (savedStickers.length < 40) {
          const rawCropCvs = document.createElement('canvas');
          rawCropCvs.width = box.w;
          rawCropCvs.height = box.h;
          const cCtx = rawCropCvs.getContext('2d');
          cCtx.drawImage(currentImage, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);

          const processCvs = document.createElement('canvas');
          processCvs.width = box.w;
          processCvs.height = box.h;
          const pCtx = processCvs.getContext('2d');
          pCtx.drawImage(rawCropCvs, 0, 0);

          if (document.getElementById('bgRemoveToggle').checked) {
            removeBg(pCtx, box.w, box.h, hex, toleranceVal);
          }

          const finalStickerCvs = createTargetCanvas(processCvs);
          addSticker(rawCropCvs, finalStickerCvs);
        }
      });

      ctx.setLineDash([]);
      scrollToPreview();
    }

    /* 規則網格分割 */
    function autoDetectGrid() {
      const mode = document.getElementById('gridMode').value;
      let cols = 5, rows = 8;

      if (mode === '4x4') { cols = 4; rows = 4; }
      else if (mode === '5x8') { cols = 5; rows = 8; }
      else if (mode === 'custom') {
        cols = parseInt(customColsInput.value) || 1;
        rows = parseInt(customRowsInput.value) || 1;
      }

      const cellW = currentImage.width / cols;
      const cellH = currentImage.height / rows;

      drawCanvas();

      let count = 0;
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = Math.max(2, Math.floor(currentImage.width / 400));
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      
      const fontSize = Math.max(14, Math.floor(cellH * 0.12));
      ctx.font = `bold ${fontSize}px sans-serif`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          count++;
          ctx.strokeRect(c * cellW, r * cellH, cellW, cellH);

          const tagW = fontSize * 1.8;
          const tagH = fontSize * 1.4;
          ctx.fillRect(c * cellW, r * cellH, tagW, tagH);

          ctx.fillStyle = '#ffffff';
          ctx.fillText(count, c * cellW + (fontSize * 0.3), r * cellH + (fontSize * 1.0));
          ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';

          if (savedStickers.length < 40) {
            const rawCropCvs = document.createElement('canvas');
            rawCropCvs.width = cellW;
            rawCropCvs.height = cellH;
            const cCtx = rawCropCvs.getContext('2d');
            cCtx.drawImage(currentImage, c * cellW, r * cellH, cellW, cellH, 0, 0, cellW, cellH);

            const processCvs = document.createElement('canvas');
            processCvs.width = cellW;
            processCvs.height = cellH;
            const pCtx = processCvs.getContext('2d');
            pCtx.drawImage(rawCropCvs, 0, 0);

            if (document.getElementById('bgRemoveToggle').checked) {
              const hex = document.getElementById('bgColor').value;
              const tol = parseInt(document.getElementById('tolerance').value);
              removeBg(pCtx, cellW, cellH, hex, tol);
            }

            const finalStickerCvs = createTargetCanvas(processCvs);
            addSticker(rawCropCvs, finalStickerCvs);
          }
        }
      }
      scrollToPreview();
    }

    let selectionBox = null;
    mainCanvas.addEventListener('mousedown', startSelect);
    mainCanvas.addEventListener('mousemove', drawSelect);
    mainCanvas.addEventListener('mouseup', endSelect);

    function startSelect(e) {
      if (!currentImage) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      startX = (e.clientX - rect.left) * scaleX;
      startY = (e.clientY - rect.top) * scaleY;
      isDrawing = true;

      if (!selectionBox) {
        selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        canvasWrapper.appendChild(selectionBox);
      }
    }

    function drawSelect(e) {
      if (!isDrawing) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      endX = (e.clientX - rect.left) * scaleX;
      endY = (e.clientY - rect.top) * scaleY;

      const left = Math.min(startX, endX) / scaleX;
      const top = Math.min(startY, endY) / scaleY;
      const width = Math.abs(endX - startX) / scaleX;
      const height = Math.abs(endY - startY) / scaleY;

      selectionBox.style.left = `${left + mainCanvas.offsetLeft}px`;
      selectionBox.style.top = `${top + mainCanvas.offsetTop}px`;
      selectionBox.style.width = `${width}px`;
      selectionBox.style.height = `${height}px`;

      document.getElementById('manualCropBtn').disabled = false;
    }

    function endSelect() { isDrawing = false; }

    function cropManualSelection() {
      if (!currentImage || Math.abs(endX - startX) < 10) return;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      const rawCropCvs = document.createElement('canvas');
      rawCropCvs.width = w;
      rawCropCvs.height = h;
      const cCtx = rawCropCvs.getContext('2d');
      cCtx.drawImage(currentImage, x, y, w, h, 0, 0, w, h);

      const processCvs = document.createElement('canvas');
      processCvs.width = w;
      processCvs.height = h;
      const pCtx = processCvs.getContext('2d');
      pCtx.drawImage(rawCropCvs, 0, 0);

      if (document.getElementById('bgRemoveToggle').checked) {
        const hex = document.getElementById('bgColor').value;
        const tol = parseInt(document.getElementById('tolerance').value);
        removeBg(pCtx, w, h, hex, tol);
      }

      const finalStickerCvs = createTargetCanvas(processCvs);
      addSticker(rawCropCvs, finalStickerCvs);

      if (selectionBox) selectionBox.remove();
      selectionBox = null;
      document.getElementById('manualCropBtn').disabled = true;
      scrollToPreview();
    }

    function removeBg(cCtx, w, h, hex, toleranceVal) {
      const imgData = cCtx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const tol = toleranceVal * 2.55;

      const targetR = parseInt(hex.slice(1, 3), 16);
      const targetG = parseInt(hex.slice(3, 5), 16);
      const targetB = parseInt(hex.slice(5, 7), 16);

      for (let i = 0; i < data.length; i += 4) {
        const dist = Math.sqrt(
          Math.pow(data[i] - targetR, 2) +
          Math.pow(data[i+1] - targetG, 2) +
          Math.pow(data[i+2] - targetB, 2)
        );
        if (dist <= tol) data[i + 3] = 0;
      }
      cCtx.putImageData(imgData, 0, 0);
    }

    function addSticker(rawCvs, finalCvs) {
      if (savedStickers.length >= 40) return;
      savedStickers.push({ rawCanvas: rawCvs, finalCanvas: finalCvs });
      updatePreview();
    }

    function removeSticker(idx) {
      savedStickers.splice(idx, 1);
      updatePreview();
    }

    function clearStickersOnly() {
      if (savedStickers.length === 0) return;
      if (confirm('確定要清空所有已產生的貼圖嗎？（母圖將會保留）')) {
        savedStickers = [];
        updatePreview();
      }
    }

    function updatePreview() {
      stickerGrid.innerHTML = '';
      savedCountEl.innerText = savedStickers.length;

      savedStickers.forEach((item, idx) => {
        const stickerDiv = document.createElement('div');
        stickerDiv.className = 'sticker-item';
        stickerDiv.draggable = true;
        stickerDiv.dataset.index = idx;

        stickerDiv.addEventListener('dragstart', handleDragStart);
        stickerDiv.addEventListener('dragover', handleDragOver);
        stickerDiv.addEventListener('drop', handleDrop);
        stickerDiv.addEventListener('dragend', handleDragEnd);

        const img = document.createElement('img');
        img.src = item.finalCanvas.toDataURL('image/png');

        const tag = document.createElement('div');
        tag.className = 'idx-tag';
        tag.innerText = String(idx + 1).padStart(3, '0');

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerText = '🪄 編輯';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          openEditModal(idx);
        };

        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.innerText = '✕';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          removeSticker(idx);
        };

        stickerDiv.appendChild(img);
        stickerDiv.appendChild(tag);
        stickerDiv.appendChild(editBtn);
        stickerDiv.appendChild(delBtn);
        stickerGrid.appendChild(stickerDiv);
      });
    }

    const modalCanvas = document.getElementById('modalCanvas');
    const mCtx = modalCanvas.getContext('2d');

    function openEditModal(idx) {
      currentEditIndex = idx;
      const modal = document.getElementById('editModal');
      modal.style.display = 'flex';

      modalCanvas.width = targetWidth;
      modalCanvas.height = targetHeight;

      modalEraserCanvas = document.createElement('canvas');
      modalEraserCanvas.width = targetWidth;
      modalEraserCanvas.height = targetHeight;

      document.getElementById('scaleSlider').value = 100;
      document.getElementById('offsetXSlider').value = 0;
      document.getElementById('offsetYSlider').value = 0;
      document.getElementById('modalBgColor').value = document.getElementById('bgColor').value;
      document.getElementById('modalTolerance').value = document.getElementById('tolerance').value;
      document.getElementById('modalTolVal').innerText = document.getElementById('tolerance').value;

      updateModalRender();
    }

    function updateModalRender() {
      if (currentEditIndex === null) return;

      const scale = parseInt(document.getElementById('scaleSlider').value);
      const offsetX = parseInt(document.getElementById('offsetXSlider').value);
      const offsetY = parseInt(document.getElementById('offsetYSlider').value);
      const hex = document.getElementById('modalBgColor').value;
      const tol = parseInt(document.getElementById('modalTolerance').value);

      document.getElementById('scaleVal').innerText = scale + '%';
      document.getElementById('offsetXVal').innerText = offsetX;
      document.getElementById('offsetYVal').innerText = offsetY;

      const rawCvs = savedStickers[currentEditIndex].rawCanvas;
      const processCvs = document.createElement('canvas');
      processCvs.width = rawCvs.width;
      processCvs.height = rawCvs.height;
      const pCtx = processCvs.getContext('2d');
      pCtx.drawImage(rawCvs, 0, 0);

      removeBg(pCtx, rawCvs.width, rawCvs.height, hex, tol);

      const targetCvs = createTargetCanvas(processCvs, scale, offsetX, offsetY);

      mCtx.clearRect(0, 0, targetWidth, targetHeight);
      mCtx.drawImage(targetCvs, 0, 0);

      if (modalEraserCanvas) {
        mCtx.save();
        mCtx.globalCompositeOperation = 'destination-out';
        mCtx.drawImage(modalEraserCanvas, 0, 0);
        mCtx.restore();
      }
    }

    modalCanvas.addEventListener('mousedown', startEraser);
    modalCanvas.addEventListener('mousemove', drawEraser);
    modalCanvas.addEventListener('mouseup', stopEraser);
    modalCanvas.addEventListener('mouseleave', stopEraser);

    function startEraser(e) {
      isErasing = true;
      drawEraser(e);
    }

    function drawEraser(e) {
      if (!isErasing || !modalEraserCanvas) return;
      const rect = modalCanvas.getBoundingClientRect();
      const scaleX = targetWidth / rect.width;
      const scaleY = targetHeight / rect.height;

      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      const size = parseInt(document.getElementById('eraserSize').value);

      const eCtx = modalEraserCanvas.getContext('2d');
      eCtx.fillStyle = '#000000';
      eCtx.beginPath();
      eCtx.arc(x, y, size / 2, 0, Math.PI * 2);
      eCtx.fill();

      updateModalRender();
    }

    function stopEraser() { isErasing = false; }

    function resetEraserLayer() {
      if (modalEraserCanvas) {
        const eCtx = modalEraserCanvas.getContext('2d');
        eCtx.clearRect(0, 0, targetWidth, targetHeight);
        updateModalRender();
      }
    }

    function resetTransform() {
      document.getElementById('scaleSlider').value = 100;
      document.getElementById('offsetXSlider').value = 0;
      document.getElementById('offsetYSlider').value = 0;
      updateModalRender();
    }

    function applyModalEdit() {
      if (currentEditIndex === null) return;

      const newFinalCvs = document.createElement('canvas');
      newFinalCvs.width = targetWidth;
      newFinalCvs.height = targetHeight;
      newFinalCvs.getContext('2d').drawImage(modalCanvas, 0, 0);

      savedStickers[currentEditIndex].finalCanvas = newFinalCvs;
      updatePreview();
      closeModal();
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
      currentEditIndex = null;
    }

    function handleDragStart(e) {
      draggedIndex = parseInt(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDrop(e) {
      e.preventDefault();
      const targetIndex = parseInt(this.dataset.index);
      if (draggedIndex !== null && draggedIndex !== targetIndex) {
        const draggedItem = savedStickers.splice(draggedIndex, 1)[0];
        savedStickers.splice(targetIndex, 0, draggedItem);
        updatePreview();
      }
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      draggedIndex = null;
    }

    function scrollToPreview() {
      stickerGrid.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadZip() {
      if (savedStickers.length === 0) return alert('預覽區內沒有圖片可以下載！');

      const zip = new JSZip();
      const type = document.getElementById('exportType').value;
      const folderName = type === 'emoji' ? 'LINE_Emoji' : 'LINE_Stickers';
      const folder = zip.folder(folderName);

      savedStickers.forEach((item, idx) => {
        const fileName = `${String(idx + 1).padStart(3, '0')}.png`;
        const base64 = item.finalCanvas.toDataURL('image/png').split(',')[1];
        folder.file(fileName, base64, { base64: true });
      });

      if (type === 'emoji' && savedStickers.length > 0) {
        const tabCvs = createTabCanvas(savedStickers[0].finalCanvas);
        const tabBase64 = tabCvs.toDataURL('image/png').split(',')[1];
        folder.file("tab.png", tabBase64, { base64: true });
      }

      zip.generateAsync({ type: "blob" }).then(content => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `${folderName}_${targetWidth}x${targetHeight}.zip`;
        a.click();
      });
    }

    function resetAll() {
      if (confirm('確定要清空所有內容與已裁切的貼圖嗎？')) {
        savedStickers = [];
        currentImage = null;
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        placeholderText.style.display = 'block';
        updatePreview();
      }
    }
  </script>
