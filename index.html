<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropAlpha 貼圖/表情貼裁切工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121216;
      color: #e0e0e0;
      padding: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e1e24;
      padding: 10px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .top-bar h1 { font-size: 18px; color: #a78bfa; }
    .badge { background: #374151; padding: 4px 10px; border-radius: 20px; font-size: 13px; }

    .main-container {
      display: flex;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    /* 左側工作區 */
    .editor-section {
      flex: 2;
      min-width: 350px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 右側面板 */
    .control-section {
      flex: 1;
      min-width: 300px;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Canvas 拖曳框選區 */
    .canvas-wrapper {
      position: relative;
      background: #000;
      border-radius: 6px;
      overflow: auto;
      max-height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px dashed #374151;
      user-select: none;
    }
    #mainCanvas { cursor: crosshair; display: block; max-width: 100%; }

    /* 按鈕樣式 */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-auto { background: #8b5cf6; color: white; font-size: 15px; }
    .btn-manual { background: #4b5563; color: white; }
    .btn-upload { background: #3b82f6; color: white; }
    .btn-download { background: #06b6d4; color: white; font-size: 16px; padding: 12px; }
    .btn-reset { background: #ef4444; color: white; }
    .btn-clear-preview {
      background: #dc2626;
      color: white;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-clear-preview:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 設定控制列 */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #272730;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .custom-grid-inputs {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .custom-grid-inputs input {
      width: 45px;
      background: #374151;
      color: #fff;
      border: 1px solid #4b5563;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 4px;
    }

    .slider-container input[type="range"] {
      flex: 1;
      accent-color: #8b5cf6;
      cursor: pointer;
    }

    /* 下方預覽區 */
    .preview-section {
      width: 100%;
      background: #1e1e24;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    /* 貼圖預覽網格 */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #121216;
      border-radius: 6px;
      background-image: linear-gradient(45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(-45deg, #1c1c22 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1c1c22 75%), 
                        linear-gradient(-45deg, transparent 75%, #1c1c22 75%);
      background-size: 12px 12px;
    }

    .sticker-item {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 2px solid #374151;
      border-radius: 6px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: transform 0.15s, border-color 0.15s;
    }
    .sticker-item:active { cursor: grabbing; }
    .sticker-item.dragging {
      opacity: 0.4;
      border-color: #8b5cf6;
      transform: scale(0.95);
    }
    .sticker-item img { max-width: 85%; max-height: 85%; object-fit: contain; pointer-events: none; }
    
    .sticker-item .idx-tag {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,0.75);
      color: #60a5fa;
      font-weight: bold;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* 單張操作按鈕 */
    .sticker-item .edit-btn {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      z-index: 2;
    }
    .sticker-item .del-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ef4444;
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      line-height: 20px;
      text-align: center;
      z-index: 2;
    }

    .selection-box {
      position: absolute;
      border: 2px dashed #06b6d4;
      background: rgba(6, 182, 212, 0.2);
      pointer-events: none;
    }

    /* 彈出視窗 (Modal) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: #1e1e24;
      padding: 20px;
      border-radius: 8px;
      max-width: 420px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 15px;
      border: 1px solid #374151;
    }
    .modal-preview {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      background-image: linear-gradient(45deg, #272730 25%, transparent 25%), 
                        linear-gradient(-45deg, #272730 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #272730 75%), 
                        linear-gradient(-45deg, transparent 75%, #272730 75%);
      background-size: 12px 12px;
      border: 1px solid #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-preview canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    .modal-actions {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>田 CropAlpha 貼圖/表情貼裁切工具</h1>
    <div style="display:flex; align-items:center; gap:10px;">
      <span style="font-size:13px; font-weight:bold; color:#a78bfa;">輸出類型：</span>
      <select id="exportType" onchange="changeExportType()" style="background:#374151; color:#fff; border:none; padding:5px 8px; border-radius:4px; font-weight:bold;">
        <option value="emoji" selected>😊 表情貼 (180 × 180 px)</option>
        <option value="sticker">🎨 標準貼圖 (370 × 320 px)</option>
      </select>
      <div class="badge">已儲存：<span id="savedCount">0</span> / 40 張</div>
    </div>
  </div>

  <div class="main-container">
    <div class="editor-section">
      <div class="setting-row">
        <span>網格偵測模式：</span>
        <select id="gridMode" onchange="toggleGridMode()" style="background:#374151; color:#fff; border:none; padding:4px; border-radius:4px;">
          <option value="5x8" selected>5 x 8 (40張 - 標準)</option>
          <option value="4x4">4 x 4 (16張)</option>
          <option value="custom">⚙ 自訂網格</option>
        </select>

        <div class="custom-grid-inputs" id="customGridInputs">
          <input type="number" id="customCols" value="5" min="1" max="20" title="欄數 (Cols)">
          <span>x</span>
          <input type="number" id="customRows" value="8" min="1" max="20" title="列數 (Rows)">
          <span id="customTotalTag" style="font-size: 11px; color: #a78bfa;">(40張)</span>
        </div>
      </div>

      <div class="setting-row">
        <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
          <label><input type="checkbox" id="bgRemoveToggle" checked> 開啟自動去背</label>
          <div>
            去背顏色：<input type="color" id="bgColor" value="#ffffff">
          </div>
        </div>
        
        <div class="slider-container">
          <span>去背強度 (容差)：</span>
          <input type="range" id="tolerance" min="1" max="100" value="15" oninput="document.getElementById('tolValue').innerText = this.value">
          <span id="tolValue" style="min-width:25px; text-align:right; font-weight:bold; color:#a78bfa;">15</span>
        </div>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
        <p id="placeholderText" style="color:#6b7280;">拖曳圖片至此，或直接按 Ctrl+V 貼上圖片</p>
      </div>
    </div>

    <div class="control-section">
      <button class="btn btn-auto" id="autoDetectBtn" onclick="autoDetectGrid()">✦ 自動偵測貼圖</button>
      <button class="btn btn-manual" id="manualCropBtn" onclick="cropManualSelection()" disabled>✂ 手動裁切並加入</button>
      
      <hr style="border-color: #272730; margin: 5px 0;">

      <label class="btn btn-upload">
        ↑ 上傳下一張 / 替換圖片
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
      </label>

      <button class="btn btn-download" onclick="downloadZip()">⬇ 下載 ZIP (符合 LINE 規範)</button>
      <button class="btn btn-reset" onclick="resetAll()">↺ 全部重來 (含母圖)</button>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <h3>已裁切貼圖預覽 (可拖動調整順序)</h3>
        <button class="btn-clear-preview" onclick="clearStickersOnly()">🗑 清空所有貼圖 (保留母圖)</button>
      </div>
      <div class="sticker-grid" id="stickerGrid"></div>
    </div>
  </div>

  <!-- 單張去背編輯 Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <h3 style="color:#a78bfa;">單張貼圖重新去背</h3>
      <div class="modal-preview">
        <canvas id="modalCanvas"></canvas>
      </div>
      
      <div class="setting-row">
        <span>去背顏色：</span>
        <input type="color" id="modalBgColor" value="#ffffff" onchange="previewModalBgRemove()">
      </div>

      <div class="slider-container">
        <span>容差：</span>
        <input type="range" id="modalTolerance" min="1" max="100" value="15" oninput="document.getElementById('modalTolVal').innerText = this.value; previewModalBgRemove();">
        <span id="modalTolVal" style="min-width:25px; text-align:right; font-weight:bold; color:#a78bfa;">15</span>
      </div>

      <div class="modal-actions">
        <button class="btn btn-auto" onclick="applyModalBgRemove()">確認套用</button>
        <button class="btn btn-manual" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    // 預設與尺寸配置 (像素必須為偶數)
    let targetWidth = 180;
    let targetHeight = 180;

    let savedStickers = [];
    let currentImage = null;
    let isDrawing = false;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    let draggedIndex = null;
    let currentEditIndex = null;

    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const placeholderText = document.getElementById('placeholderText');
    const stickerGrid = document.getElementById('stickerGrid');
    const savedCountEl = document.getElementById('savedCount');

    const customColsInput = document.getElementById('customCols');
    const customRowsInput = document.getElementById('customRows');
    const customTotalTag = document.getElementById('customTotalTag');

    function changeExportType() {
      const type = document.getElementById('exportType').value;
      if (type === 'emoji') {
        targetWidth = 180;
        targetHeight = 180;
      } else if (type === 'sticker') {
        targetWidth = 370;
        targetHeight = 320;
      }
      
      // 若已裁切貼圖，重新生成適應新尺寸的 finalCanvas
      savedStickers.forEach(item => {
        item.finalCanvas = createTargetCanvas(item.rawCanvas);
      });
      updatePreview();
    }

    function updateCustomTotal() {
      const c = parseInt(customColsInput.value) || 1;
      const r = parseInt(customRowsInput.value) || 1;
      customTotalTag.innerText = `(${c * r}張)`;
    }
    customColsInput.addEventListener('input', updateCustomTotal);
    customRowsInput.addEventListener('input', updateCustomTotal);

    function toggleGridMode() {
      const mode = document.getElementById('gridMode').value;
      const customInputs = document.getElementById('customGridInputs');
      customInputs.style.display = (mode === 'custom') ? 'flex' : 'none';
      if (mode === 'custom') updateCustomTotal();
    }

    window.addEventListener('paste', e => {
      const items = e.clipboardData.items;
      for (let item of items) {
        if (item.type.indexOf('image') !== -1) loadImage(item.getAsFile());
      }
    });

    canvasWrapper.addEventListener('dragover', e => e.preventDefault());
    canvasWrapper.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
    });

    function handleFileSelect(e) {
      if (e.target.files.length > 0) loadImage(e.target.files[0]);
    }

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = event => {
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          placeholderText.style.display = 'none';
          drawCanvas();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    function drawCanvas() {
      if (!currentImage) return;
      mainCanvas.width = currentImage.width;
      mainCanvas.height = currentImage.height;
      ctx.drawImage(currentImage, 0, 0);
    }

    // 將裁切後的 Canvas 放大/縮小並置中放入標準規格（確保偶數寬高）
    function createTargetCanvas(sourceCvs) {
      const finalCvs = document.createElement('canvas');
      finalCvs.width = targetWidth;
      finalCvs.height = targetHeight;
      const fCtx = finalCvs.getContext('2d');

      fCtx.imageSmoothingEnabled = true;
      fCtx.imageSmoothingQuality = 'high';

      const scale = Math.min(targetWidth / sourceCvs.width, targetHeight / sourceCvs.height);
      const drawW = sourceCvs.width * scale;
      const drawH = sourceCvs.height * scale;
      const offsetX = (targetWidth - drawW) / 2;
      const offsetY = (targetHeight - drawH) / 2;

      fCtx.drawImage(sourceCvs, 0, 0, sourceCvs.width, sourceCvs.height, offsetX, offsetY, drawW, drawH);
      return finalCvs;
    }

    function autoDetectGrid() {
      if (!currentImage) return alert('請先上傳圖片！');

      const mode = document.getElementById('gridMode').value;
      let cols = 5, rows = 8;

      if (mode === '4x4') { cols = 4; rows = 4; }
      else if (mode === '5x8') { cols = 5; rows = 8; }
      else if (mode === 'custom') {
        cols = parseInt(customColsInput.value) || 1;
        rows = parseInt(customRowsInput.value) || 1;
      }

      const cellW = currentImage.width / cols;
      const cellH = currentImage.height / rows;

      drawCanvas();

      let count = 0;
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = Math.max(2, Math.floor(currentImage.width / 400));
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      
      const fontSize = Math.max(14, Math.floor(cellH * 0.12));
      ctx.font = `bold ${fontSize}px sans-serif`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          count++;
          ctx.strokeRect(c * cellW, r * cellH, cellW, cellH);

          const tagW = fontSize * 1.8;
          const tagH = fontSize * 1.4;
          ctx.fillRect(c * cellW, r * cellH, tagW, tagH);

          ctx.fillStyle = '#ffffff';
          ctx.fillText(count, c * cellW + (fontSize * 0.3), r * cellH + (fontSize * 1.0));
          ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';

          if (savedStickers.length < 40) {
            const rawCropCvs = document.createElement('canvas');
            rawCropCvs.width = cellW;
            rawCropCvs.height = cellH;
            const cCtx = rawCropCvs.getContext('2d');
            cCtx.drawImage(currentImage, c * cellW, r * cellH, cellW, cellH, 0, 0, cellW, cellH);

            const processCvs = document.createElement('canvas');
            processCvs.width = cellW;
            processCvs.height = cellH;
            const pCtx = processCvs.getContext('2d');
            pCtx.drawImage(rawCropCvs, 0, 0);

            if (document.getElementById('bgRemoveToggle').checked) {
              const hex = document.getElementById('bgColor').value;
              const tol = parseInt(document.getElementById('tolerance').value);
              removeBg(pCtx, cellW, cellH, hex, tol);
            }

            const finalStickerCvs = createTargetCanvas(processCvs);
            addSticker(rawCropCvs, finalStickerCvs);
          }
        }
      }
      scrollToPreview();
    }

    let selectionBox = null;
    mainCanvas.addEventListener('mousedown', startSelect);
    mainCanvas.addEventListener('mousemove', drawSelect);
    mainCanvas.addEventListener('mouseup', endSelect);

    function startSelect(e) {
      if (!currentImage) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      startX = (e.clientX - rect.left) * scaleX;
      startY = (e.clientY - rect.top) * scaleY;
      isDrawing = true;

      if (!selectionBox) {
        selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        canvasWrapper.appendChild(selectionBox);
      }
    }

    function drawSelect(e) {
      if (!isDrawing) return;
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;

      endX = (e.clientX - rect.left) * scaleX;
      endY = (e.clientY - rect.top) * scaleY;

      const left = Math.min(startX, endX) / scaleX;
      const top = Math.min(startY, endY) / scaleY;
      const width = Math.abs(endX - startX) / scaleX;
      const height = Math.abs(endY - startY) / scaleY;

      selectionBox.style.left = `${left + mainCanvas.offsetLeft}px`;
      selectionBox.style.top = `${top + mainCanvas.offsetTop}px`;
      selectionBox.style.width = `${width}px`;
      selectionBox.style.height = `${height}px`;

      document.getElementById('manualCropBtn').disabled = false;
    }

    function endSelect() { isDrawing = false; }

    function cropManualSelection() {
      if (!currentImage || Math.abs(endX - startX) < 10) return;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      const rawCropCvs = document.createElement('canvas');
      rawCropCvs.width = w;
      rawCropCvs.height = h;
      const cCtx = rawCropCvs.getContext('2d');
      cCtx.drawImage(currentImage, x, y, w, h, 0, 0, w, h);

      const processCvs = document.createElement('canvas');
      processCvs.width = w;
      processCvs.height = h;
      const pCtx = processCvs.getContext('2d');
      pCtx.drawImage(rawCropCvs, 0, 0);

      if (document.getElementById('bgRemoveToggle').checked) {
        const hex = document.getElementById('bgColor').value;
        const tol = parseInt(document.getElementById('tolerance').value);
        removeBg(pCtx, w, h, hex, tol);
      }

      const finalStickerCvs = createTargetCanvas(processCvs);
      addSticker(rawCropCvs, finalStickerCvs);

      if (selectionBox) selectionBox.remove();
      selectionBox = null;
      document.getElementById('manualCropBtn').disabled = true;
      scrollToPreview();
    }

    function removeBg(cCtx, w, h, hex, toleranceVal) {
      const imgData = cCtx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const tol = toleranceVal * 2.55;

      const targetR = parseInt(hex.slice(1, 3), 16);
      const targetG = parseInt(hex.slice(3, 5), 16);
      const targetB = parseInt(hex.slice(5, 7), 16);

      for (let i = 0; i < data.length; i += 4) {
        const dist = Math.sqrt(
          Math.pow(data[i] - targetR, 2) +
          Math.pow(data[i+1] - targetG, 2) +
          Math.pow(data[i+2] - targetB, 2)
        );
        if (dist <= tol) data[i + 3] = 0;
      }
      cCtx.putImageData(imgData, 0, 0);
    }

    function addSticker(rawCvs, finalCvs) {
      if (savedStickers.length >= 40) return;
      savedStickers.push({ rawCanvas: rawCvs, finalCanvas: finalCvs });
      updatePreview();
    }

    function removeSticker(idx) {
      savedStickers.splice(idx, 1);
      updatePreview();
    }

    function clearStickersOnly() {
      if (savedStickers.length === 0) return;
      if (confirm('確定要清空所有已產生的貼圖嗎？（母圖將會保留）')) {
        savedStickers = [];
        updatePreview();
      }
    }

    function updatePreview() {
      stickerGrid.innerHTML = '';
      savedCountEl.innerText = savedStickers.length;

      savedStickers.forEach((item, idx) => {
        const stickerDiv = document.createElement('div');
        stickerDiv.className = 'sticker-item';
        stickerDiv.draggable = true;
        stickerDiv.dataset.index = idx;

        stickerDiv.addEventListener('dragstart', handleDragStart);
        stickerDiv.addEventListener('dragover', handleDragOver);
        stickerDiv.addEventListener('drop', handleDrop);
        stickerDiv.addEventListener('dragend', handleDragEnd);

        const img = document.createElement('img');
        img.src = item.finalCanvas.toDataURL('image/png');

        const tag = document.createElement('div');
        tag.className = 'idx-tag';
        tag.innerText = String(idx + 1).padStart(3, '0');

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerText = '🪄 去背';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          openEditModal(idx);
        };

        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.innerText = '✕';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          removeSticker(idx);
        };

        stickerDiv.appendChild(img);
        stickerDiv.appendChild(tag);
        stickerDiv.appendChild(editBtn);
        stickerDiv.appendChild(delBtn);
        stickerGrid.appendChild(stickerDiv);
      });
    }

    function openEditModal(idx) {
      currentEditIndex = idx;
      const modal = document.getElementById('editModal');
      modal.style.display = 'flex';

      const modalCanvas = document.getElementById('modalCanvas');
      modalCanvas.width = targetWidth;
      modalCanvas.height = targetHeight;

      document.getElementById('modalBgColor').value = document.getElementById('bgColor').value;
      document.getElementById('modalTolerance').value = document.getElementById('tolerance').value;
      document.getElementById('modalTolVal').innerText = document.getElementById('tolerance').value;

      previewModalBgRemove();
    }

    function previewModalBgRemove() {
      if (currentEditIndex === null) return;
      const rawCvs = savedStickers[currentEditIndex].rawCanvas;
      const hex = document.getElementById('modalBgColor').value;
      const tol = parseInt(document.getElementById('modalTolerance').value);

      const processCvs = document.createElement('canvas');
      processCvs.width = rawCvs.width;
      processCvs.height = rawCvs.height;
      const pCtx = processCvs.getContext('2d');
      pCtx.drawImage(rawCvs, 0, 0);

      removeBg(pCtx, rawCvs.width, rawCvs.height, hex, tol);

      const previewTarget = createTargetCanvas(processCvs);
      const modalCanvas = document.getElementById('modalCanvas');
      const mCtx = modalCanvas.getContext('2d');
      mCtx.clearRect(0, 0, targetWidth, targetHeight);
      mCtx.drawImage(previewTarget, 0, 0);
    }

    function applyModalBgRemove() {
      if (currentEditIndex === null) return;
      const modalCanvas = document.getElementById('modalCanvas');
      
      const newFinalCvs = document.createElement('canvas');
      newFinalCvs.width = targetWidth;
      newFinalCvs.height = targetHeight;
      newFinalCvs.getContext('2d').drawImage(modalCanvas, 0, 0);

      savedStickers[currentEditIndex].finalCanvas = newFinalCvs;
      updatePreview();
      closeModal();
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
      currentEditIndex = null;
    }

    function handleDragStart(e) {
      draggedIndex = parseInt(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDrop(e) {
      e.preventDefault();
      const targetIndex = parseInt(this.dataset.index);
      if (draggedIndex !== null && draggedIndex !== targetIndex) {
        const draggedItem = savedStickers.splice(draggedIndex, 1)[0];
        savedStickers.splice(targetIndex, 0, draggedItem);
        updatePreview();
      }
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      draggedIndex = null;
    }

    function scrollToPreview() {
      stickerGrid.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadZip() {
      if (savedStickers.length === 0) return alert('預覽區內沒有圖片可以下載！');

      const zip = new JSZip();
      const type = document.getElementById('exportType').value;
      const folderName = type === 'emoji' ? 'LINE_Emoji' : 'LINE_Stickers';
      const folder = zip.folder(folderName);

      savedStickers.forEach((item, idx) => {
        const fileName = `${String(idx + 1).padStart(3, '0')}.png`;
        const base64 = item.finalCanvas.toDataURL('image/png').split(',')[1];
        folder.file(fileName, base64, { base64: true });
      });

      zip.generateAsync({ type: "blob" }).then(content => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `${folderName}_${targetWidth}x${targetHeight}.zip`;
        a.click();
      });
    }

    function resetAll() {
      if (confirm('確定要清空所有內容與已裁切的貼圖嗎？')) {
        savedStickers = [];
        currentImage = null;
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        placeholderText.style.display = 'block';
        updatePreview();
      }
    }
  </script>
</body>
</html>
